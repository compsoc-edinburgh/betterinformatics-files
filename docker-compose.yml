services:
  minio:
    image: minio/minio:RELEASE.2023-10-25T06-33-25Z
    environment:
      - MINIO_ACCESS_KEY=minio
      - MINIO_SECRET_KEY=minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/export
    command: server /export --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-I", "localhost:9000/minio/health/live"]
      interval: 1s
      timeout: 1s
      retries: 20
  createbuckets:
    image: minio/mc:RELEASE.2023-10-24T21-42-22Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c " /usr/bin/mc config host add myminio http://minio:9000 minio minio123; /usr/bin/mc mb myminio/community-solutions; "
  postgres:
    image: postgres:16
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_DB=postgres
    volumes:
      - ./data/sql:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d postgres -U postgres"]
      interval: 1s
      timeout: 1s
      retries: 50
  community-solutions:
    platform: linux/amd64 # Required since vseth base image is only available in amd64
    build:
      target: backend-hotreload
      args:
        git_branch: <docker>
        git_commit: <compose>
    develop:
      watch:
        - action: sync
          path: backend/
          target: /app
          ignore:
            - __pycache__/
        - action: rebuild
          path: backend/requirements.txt
    container_name: community-solutions
    ports:
      - "8081:8081"
    env_file:
      - backend/.env.development
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  react-frontend:
    profiles: [frontend] # only executed if the '--profile frontend' flag is given
    build:
      target: frontend-dev
      args:
        git_branch: <docker>
        git_commit: <compose>
    develop:
      watch:
        - action: sync
          path: frontend/src
          target: /app/src
        - action: rebuild
          path: frontend/package.json
    ports:
      - "3000:3000"
    extra_hosts:
      - "minio:127.0.0.1"
    environment:
      - BACKEND_HOST=community-solutions
