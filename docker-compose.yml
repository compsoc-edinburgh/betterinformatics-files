services:
  rclone-create-bucket:
    image: busybox
    command: mkdir -p /data/s3/community-solutions
    volumes:
      - ./data:/data

  rclone:
    image: rclone/rclone
    environment:
      RCLONE_AUTH_KEY: '"rclone,rclone123"'
    ports:
      - "9000:9000"
    volumes:
      - ./data/s3:/data
      - ./util/rclone.conf:/config/rclone/rclone.conf
    command: serve s3 local:/data --addr 0.0.0.0:9000 --allow-origin '*'
    healthcheck:
      test: ["CMD", "rclone", "ls", "serves3:/"]
      interval: 1s
      timeout: 1s
      retries: 60
    depends_on:
      rclone-create-bucket:
        condition: service_completed_successfully

  postgres:
    image: postgres:16-bookworm
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_DB=postgres
    volumes:
      - ./data/sql:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d postgres -U postgres"]
      interval: 1s
      timeout: 1s
      retries: 50
  community-solutions:
    platform: linux/amd64 # Required since vseth base image is only available in amd64
    build:
      target: backend-hotreload
      args:
        git_branch: <docker>
        git_commit: <compose>
    develop:
      watch:
        - action: sync
          path: backend/
          target: /app
          ignore:
            - __pycache__/
        - action: rebuild
          path: backend/requirements.txt
    container_name: community-solutions
    volumes:
      - ./keys:/app/config
    ports:
      - "8081:8081"
    env_file:
      - backend/.env.development
    depends_on:
      postgres:
        condition: service_healthy
      rclone:
        condition: service_healthy

  react-frontend:
    profiles: [frontend] # only executed if the '--profile frontend' flag is given
    build:
      target: frontend-dev
      args:
        git_branch: <docker>
        git_commit: <compose>
    develop:
      watch:
        - action: sync
          path: frontend/src
          target: /app/src
        - action: rebuild
          path: frontend/package.json
    ports:
      - "3000:3000"
    extra_hosts:
      - "rclone:127.0.0.1"
    environment:
      - BACKEND_HOST=community-solutions
